---
# Security zone + interface assignment
# Usage: -e "zone=trust mode=layer3 interfaces=ethernet1/1,ethernet1/2"
- name: PAN-OS security zone
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - paloaltonetworks.panos

  vars:
    state: present
    mode: layer3              # layer3 | layer2 | virtual-wire | tap | tunnel
    interfaces: ""
    zone_profile: ""

  tasks:
    - name: "{{ state | capitalize }} zone {{ zone }}"
      paloaltonetworks.panos.panos_zone:
        provider: "{{ panos_provider }}"
        zone: "{{ zone }}"
        mode: "{{ mode }}"
        interface: "{{ interfaces.split(',') if interfaces else [] }}"
        zone_profile: "{{ zone_profile | default(omit) }}"
        state: "{{ state }}"
        commit: false
