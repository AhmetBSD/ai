---
# Candidate → running commit
# Usage: -e "commit_description='deploy via skill'"
- name: PAN-OS commit
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - paloaltonetworks.panos

  vars:
    commit_description: "commit via palo-alto"
    admins: []                # restrict commit to specific admin's changes
    force: false              # force commit even with warnings
    exclude_device_and_network: false
    exclude_shared_objects: false

  tasks:
    - name: Commit candidate config
      paloaltonetworks.panos.panos_commit_firewall:
        provider: "{{ panos_provider }}"
        admins: "{{ admins }}"
        description: "{{ commit_description }}"
        force: "{{ force }}"
        exclude_device_and_network: "{{ exclude_device_and_network }}"
        exclude_shared_objects: "{{ exclude_shared_objects }}"
      register: commit_result

    - name: Show commit job info
      ansible.builtin.debug:
        msg: "Commit job {{ commit_result.jobid }} — {{ commit_result.details }}"
