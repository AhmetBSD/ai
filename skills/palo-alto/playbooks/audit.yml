---
# Read-only audit: rule hit-count + unused objects
- name: PAN-OS audit (read-only)
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - paloaltonetworks.panos

  tasks:
    - name: Get rule hit counts
      paloaltonetworks.panos.panos_op:
        provider: "{{ panos_provider }}"
        cmd: "<show><rule-hit-count><vsys><vsys-name><entry name='vsys1'><rule-base><entry name='security'><rules><all/></rules></entry></rule-base></entry></vsys-name></vsys></rule-hit-count></show>"
      register: hit_count

    - name: Get unused address objects
      paloaltonetworks.panos.panos_op:
        provider: "{{ panos_provider }}"
        cmd: "<show><config><list><unused-objects/></list></config></show>"
      register: unused
      ignore_errors: true

    - name: Audit report
      ansible.builtin.debug:
        msg:
          - "=== Rule Hit Counts ==="
          - "{{ hit_count.stdout | default('n/a') }}"
          - "=== Unused Objects ==="
          - "{{ unused.stdout | default('n/a — try cleanup-unused script') }}"
