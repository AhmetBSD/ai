---
# Address object CRUD
# Usage: -e "name=web01 value=10.0.0.10 type=ip-netmask [state=present]"
- name: PAN-OS address object
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - paloaltonetworks.panos

  vars:
    state: present
    type: ip-netmask    # ip-netmask | ip-range | ip-wildcard | fqdn
    description: ""
    tag: []

  tasks:
    - name: "{{ state | capitalize }} address object {{ name }}"
      paloaltonetworks.panos.panos_address_object:
        provider: "{{ panos_provider }}"
        name: "{{ name }}"
        value: "{{ value }}"
        address_type: "{{ type }}"
        description: "{{ description }}"
        tag: "{{ tag }}"
        state: "{{ state }}"
        commit: false
