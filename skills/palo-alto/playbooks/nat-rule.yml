---
# NAT rule (source / destination NAT)
# Usage: -e "rule_name=snat-internet from_zone=trust to_zone=untrust source=10.0.0.0/24 dest=any snat_type=dynamic-ip-and-port snat_iface=ethernet1/1"
- name: PAN-OS NAT rule
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - paloaltonetworks.panos

  vars:
    state: present
    source: ["any"]
    destination: ["any"]
    service: any
    snat_type: ""             # dynamic-ip-and-port | dynamic-ip | static-ip
    snat_address_type: interface-address  # interface-address | translated-address
    snat_interface: ""
    snat_static_address: ""
    dnat_address: ""
    dnat_port: ""
    description: ""

  tasks:
    - name: "{{ state | capitalize }} NAT rule {{ rule_name }}"
      paloaltonetworks.panos.panos_nat_rule:
        provider: "{{ panos_provider }}"
        rule_name: "{{ rule_name }}"
        source_zone: "{{ from_zone.split(',') }}"
        destination_zone: "{{ to_zone.split(',') }}"
        source_ip: "{{ source if source is sequence else source.split(',') }}"
        destination_ip: "{{ destination if destination is sequence else destination.split(',') }}"
        service: "{{ service }}"
        snat_type: "{{ snat_type | default(omit) }}"
        snat_address_type: "{{ snat_address_type | default(omit) }}"
        snat_interface: "{{ snat_interface | default(omit) }}"
        snat_static_address: "{{ snat_static_address | default(omit) }}"
        dnat_address: "{{ dnat_address | default(omit) }}"
        dnat_port: "{{ dnat_port | default(omit) }}"
        description: "{{ description }}"
        state: "{{ state }}"
        commit: false
