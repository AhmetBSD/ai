---
# Security policy rule
# Usage: -e "rule_name=allow-web src_zone=trust dst_zone=untrust src=any dst=web01 app=web-browsing,ssl action=allow"
- name: PAN-OS security rule
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - paloaltonetworks.panos

  vars:
    state: present
    source_zone: ["any"]
    destination_zone: ["any"]
    source_ip: ["any"]
    destination_ip: ["any"]
    application: ["any"]
    service: ["application-default"]
    action: allow
    log_start: false
    log_end: true
    location: bottom    # top | bottom | before | after
    description: ""

  tasks:
    - name: "{{ state | capitalize }} security rule {{ rule_name }}"
      paloaltonetworks.panos.panos_security_rule:
        provider: "{{ panos_provider }}"
        rule_name: "{{ rule_name }}"
        source_zone: "{{ source_zone if source_zone is sequence else [source_zone] }}"
        destination_zone: "{{ destination_zone if destination_zone is sequence else [destination_zone] }}"
        source_ip: "{{ source_ip if source_ip is sequence else source_ip.split(',') }}"
        destination_ip: "{{ destination_ip if destination_ip is sequence else destination_ip.split(',') }}"
        application: "{{ application if application is sequence else application.split(',') }}"
        service: "{{ service if service is sequence else service.split(',') }}"
        action: "{{ action }}"
        log_start: "{{ log_start }}"
        log_end: "{{ log_end }}"
        location: "{{ location }}"
        description: "{{ description }}"
        state: "{{ state }}"
        commit: false
